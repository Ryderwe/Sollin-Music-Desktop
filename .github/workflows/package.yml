name: Package Desktop Apps

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release after packaging"
        type: boolean
        required: false
        default: false
      tag_name:
        description: "Release tag, for example v1.3.1. If empty, a manual tag is generated."
        type: string
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sollin-windows
          path: |
            release/*.exe

  build-macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder --mac dmg zip --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sollin-macos-x64
          path: |
            release/*.dmg
            release/*.zip

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sollin-macos-arm64
          path: |
            release/*.dmg
            release/*.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder --linux --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sollin-linux
          path: |
            release/*.AppImage
            release/*.deb

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs:
      - build-windows
      - build-macos-intel
      - build-macos-arm
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG_INPUT="${{ inputs.tag_name }}"
            if [[ -n "$TAG_INPUT" ]]; then
              TAG="$TAG_INPUT"
            else
              TAG="manual-${GITHUB_RUN_ID}"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
